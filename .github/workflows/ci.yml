name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://user:password@localhost:5432/gativcare?schema=public"
      AUTH_SECRET: "ci-dummy-secret"
      SMTP_HOST: "smtp.example.com"
      SMTP_PORT: "465"
      SMTP_USER: "ci-dummy@example.com"
      SMTP_PASSWORD: "ci-dummy-password"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test
